<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>History</title>
    <link rel="icon" href="https://files.catbox.moe/vygiot.png" type="image/png">
    <style>
        :root {
            --bg: #000;
            --surface: #080808;
            --border: #1c1c1c;
            --text: #f0f0f0;
            --text-secondary: #777;
            --accent: #fff;
            --hover: #121212;
            --danger: #ff3b30;
            --success: #30d158;
            --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.2px;
            padding-bottom: 80px;
        }

        /* TOP BAR */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.12s;
            text-decoration: none;
            flex-shrink: 0;
        }
        .back-btn:active {
            background: var(--hover);
            color: var(--text);
        }
        .page-title {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .clear-btn {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            background: none;
            border: none;
            font-family: var(--font);
            font-weight: 500;
            transition: color 0.12s;
        }
        .clear-btn:active {
            color: var(--danger);
        }

        /* MAIN CONTENT */
        .content {
            padding: 20px 16px;
            max-width: 700px;
            margin: 0 auto;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
        }
        .empty-state strong {
            color: var(--text);
            font-weight: 600;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.12s;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history-item:active {
            background: var(--hover);
            border-color: #333;
        }
        .history-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-model {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.04);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .history-time {
            font-size: 10px;
            color: #555;
        }
        .history-preview {
            font-size: 13px;
            color: var(--text);
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .history-meta {
            font-size: 10px;
            color: #555;
            display: flex;
            gap: 8px;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 env(safe-area-inset-bottom, 8px);
            z-index: 50;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            text-decoration: none;
            color: #555;
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding: 4px 14px;
            border-radius: 12px;
            transition: all 0.15s;
        }
        .bottom-nav a.active {
            color: #fff;
        }
        .bottom-nav a .nav-icon {
            font-size: 18px;
            line-height: 1;
        }
    </style>
</head>
<body>

    <header class="topbar">
        <a href="dashboard.html" class="back-btn">&#8592;</a>
        <span class="page-title">History</span>
        <button class="clear-btn" onclick="clearHistory()">Hapus Semua</button>
    </header>

    <main class="content" id="historyContent">
        <div class="empty-state" id="emptyState">
            <p><strong>Belum ada riwayat percakapan.</strong></p>
            <p>Mulai chat di Vlota, Vloral, atau Jailbreak mode.</p>
        </div>
        <div class="history-list" id="historyList" style="display:none;"></div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html"><span class="nav-icon">&#9679;</span> Home</a>
        <a href="vlota-chat.html"><span class="nav-icon">&#9679;</span> Vlota</a>
        <a href="vloral-chat.html"><span class="nav-icon">&#9679;</span> Vloral</a>
        <a href="jailbreak.html"><span class="nav-icon">&#9679;</span> Jailbreak</a>
        <a href="settings.html"><span class="nav-icon">&#9679;</span> Settings</a>
    </nav>

    <script>
        const HISTORY_KEY = 'vlota_chat_history';

        function getHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveHistory(history) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function renderHistory() {
            const history = getHistory();
            const emptyState = document.getElementById('emptyState');
            const historyList = document.getElementById('historyList');

            if (history.length === 0) {
                emptyState.style.display = 'block';
                historyList.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            historyList.style.display = 'flex';
            historyList.innerHTML = '';

            // Sort newest first
            history.sort((a, b) => b.timestamp - a.timestamp);

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = () => {
                    // Navigate to appropriate chat page
                    if (item.source === 'vlota') {
                        window.location.href = 'vlota-chat.html';
                    } else if (item.source === 'vloral') {
                        window.location.href = 'vloral-chat.html';
                    } else if (item.source === 'jailbreak') {
                        window.location.href = 'jailbreak.html';
                    }
                };

                const top = document.createElement('div');
                top.className = 'history-top';

                const model = document.createElement('span');
                model.className = 'history-model';
                model.textContent = item.model || item.source;

                const time = document.createElement('span');
                time.className = 'history-time';
                const date = new Date(item.timestamp);
                time.textContent = date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

                top.appendChild(model);
                top.appendChild(time);

                const preview = document.createElement('div');
                preview.className = 'history-preview';
                preview.textContent = item.preview || item.text || 'Pesan';

                const meta = document.createElement('div');
                meta.className = 'history-meta';
                const sourceLabel = document.createElement('span');
                sourceLabel.textContent = item.source === 'vlota' ? 'Vlota AI' : item.source === 'vloral' ? 'Vloral AI' : 'Jailbreak Mode';
                meta.appendChild(sourceLabel);

                div.appendChild(top);
                div.appendChild(preview);
                div.appendChild(meta);
                historyList.appendChild(div);
            });
        }

        function clearHistory() {
            if (confirm('Hapus semua riwayat percakapan?')) {
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
            }
        }

        // If no history exists, add some dummy examples for demonstration
        if (getHistory().length === 0) {
            const examples = [
                {
                    source: 'vlota',
                    model: 'ChatGPT',
                    text: 'Jelaskan tentang Vlota AI',
                    preview: 'Jelaskan tentang Vlota AI',
                    timestamp: Date.now() - 300000
                },
                {
                    source: 'vloral',
                    model: 'Gemini',
                    text: 'Halo, perkenalkan dirimu',
                    preview: 'Halo, perkenalkan dirimu',
                    timestamp: Date.now() - 900000
                },
                {
                    source: 'jailbreak',
                    model: 'WormGPT',
                    text: 'Cara hek nasa',
                    preview: 'Cara hek nasa',
                    timestamp: Date.now() - 1800000
                }
            ];
            saveHistory(examples);
        }

        renderHistory();
    </script>
</body>
</html>
