<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vlota AI | Vloral AI</title>
    <link rel="icon" href="https://files.catbox.moe/vygiot.png" type="image/png">
    <style>
        :root {
            --bg: #000;
            --text: #f0f0f0;
            --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .loader {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            overflow: hidden;
            background: #0a0a0a;
            border: 1px solid #1c1c1c;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .text {
            font-size: 13px;
            color: #777;
            letter-spacing: 0.3px;
        }
        .dot-pulse {
            display: flex;
            gap: 5px;
        }
        .dot-pulse span {
            width: 4px;
            height: 4px;
            background: #555;
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo">
            <img src="https://files.catbox.moe/vygiot.png" alt="Vlota AI">
        </div>
        <div class="text">Vlota AI & Vloral AI</div>
        <div class="dot-pulse">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script>
        // Redirect ke dashboard setelah jeda singkat
        setTimeout(function() {
            window.location.href = 'dashboard.html';
        }, 800);
    </script>
</body>
</html>
