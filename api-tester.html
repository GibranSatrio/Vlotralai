<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>API Tester</title>
    <link rel="icon" href="https://files.catbox.moe/vygiot.png" type="image/png">
    <style>
        :root {
            --bg: #000;
            --surface: #080808;
            --border: #1c1c1c;
            --text: #f0f0f0;
            --text-secondary: #777;
            --accent: #fff;
            --hover: #121212;
            --danger: #ff3b30;
            --success: #30d158;
            --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --mono: 'JetBrains Mono', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.2px;
            padding-bottom: 80px;
        }

        /* TOP BAR */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.12s;
            text-decoration: none;
            flex-shrink: 0;
        }
        .back-btn:active {
            background: var(--hover);
            color: var(--text);
        }
        .page-title {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* MAIN CONTENT */
        .content {
            padding: 20px 16px;
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.2px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 14px;
        }
        .form-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: #444;
        }
        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23777' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 32px;
        }
        .form-textarea {
            min-height: 80px;
            font-family: var(--mono);
            font-size: 12px;
            resize: vertical;
        }

        .btn {
            padding: 10px 20px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: -0.2px;
            transition: all 0.15s;
            font-family: var(--font);
        }
        .btn:active {
            opacity: 0.85;
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            margin-left: 8px;
        }
        .btn-outline:active {
            background: var(--hover);
        }

        .response-area {
            margin-top: 8px;
        }
        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .status-code {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .status-success {
            background: rgba(48,209,88,0.1);
            color: var(--success);
            border: 1px solid rgba(48,209,88,0.2);
        }
        .status-error {
            background: rgba(255,59,48,0.1);
            color: var(--danger);
            border: 1px solid rgba(255,59,48,0.2);
        }
        pre {
            background: #050505;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            overflow-x: auto;
            font-size: 11px;
            font-family: var(--mono);
            color: #ccc;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
        .copy-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 9px;
            color: #888;
            cursor: pointer;
            font-family: var(--font);
            transition: all 0.12s;
        }
        .copy-btn:active {
            background: #fff;
            color: #000;
        }
        .copy-btn.copied {
            color: var(--success);
            border-color: rgba(48,209,88,0.3);
        }

        .endpoint-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .endpoint-chip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.12s;
            font-size: 12px;
        }
        .endpoint-chip:active {
            background: var(--hover);
        }
        .endpoint-method {
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 env(safe-area-inset-bottom, 8px);
            z-index: 50;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            text-decoration: none;
            color: #555;
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding: 4px 14px;
            border-radius: 12px;
            transition: all 0.15s;
        }
        .bottom-nav a.active {
            color: #fff;
        }
        .bottom-nav a .nav-icon {
            font-size: 18px;
            line-height: 1;
        }
    </style>
</head>
<body>

    <header class="topbar">
        <a href="dashboard.html" class="back-btn">&#8592;</a>
        <span class="page-title">API Tester</span>
    </header>

    <main class="content">
        <!-- Quick Endpoints -->
        <div class="card">
            <div class="card-title">Quick Endpoints</div>
            <div class="endpoint-list">
                <div class="endpoint-chip" onclick="loadEndpoint('chat-gpt')">
                    <span>Vlota AI Chat</span>
                    <span class="endpoint-method">GET</span>
                </div>
                <div class="endpoint-chip" onclick="loadEndpoint('gemini')">
                    <span>Vloral AI (Gemini)</span>
                    <span class="endpoint-method">GET</span>
                </div>
                <div class="endpoint-chip" onclick="loadEndpoint('worm-gpt')">
                    <span>WormGPT (Jailbreak)</span>
                    <span class="endpoint-method">GET</span>
                </div>
                <div class="endpoint-chip" onclick="loadEndpoint('uncensored')">
                    <span>Anubis-70B (Uncensored)</span>
                    <span class="endpoint-method">GET</span>
                </div>
            </div>
        </div>

        <!-- Request Builder -->
        <div class="card">
            <div class="card-title">Request Builder</div>
            <div class="form-group">
                <label class="form-label">Endpoint</label>
                <select class="form-select" id="endpointSelect" onchange="onEndpointChange()">
                    <option value="chat-gpt">/api/ai/chat-gpt.php (Vlota)</option>
                    <option value="gemini">/api/ai/gemini.php (Vloral)</option>
                    <option value="worm-gpt">/api/ai/worm-gpt.php (WormGPT)</option>
                    <option value="uncensored">/api/ai/uncensored-ai.php (Anubis)</option>
                </select>
            </div>

            <div class="form-group" id="modelGroup">
                <label class="form-label">Model</label>
                <select class="form-select" id="modelSelect">
                    <option value="chatgpt">ChatGPT</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="claude">Claude</option>
                    <option value="grok">Grok</option>
                    <option value="perplexity">Perplexity</option>
                    <option value="llama">Llama</option>
                    <option value="qwen">Qwen</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Input Text</label>
                <textarea class="form-textarea" id="inputText" placeholder="Masukkan teks atau prompt...">Halo, perkenalkan dirimu</textarea>
            </div>

            <button class="btn" onclick="sendRequest()">Send Request</button>
            <button class="btn btn-outline" onclick="clearResponse()">Clear</button>

            <div class="response-area" id="responseArea" style="display:none;">
                <div class="response-header">
                    <span class="status-code" id="statusCode">200 OK</span>
                    <button class="copy-btn" onclick="copyResponse()">Salin</button>
                </div>
                <pre id="responseBody"></pre>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html"><span class="nav-icon">&#9679;</span> Home</a>
        <a href="vlota-chat.html"><span class="nav-icon">&#9679;</span> Vlota</a>
        <a href="vloral-chat.html"><span class="nav-icon">&#9679;</span> Vloral</a>
        <a href="jailbreak.html"><span class="nav-icon">&#9679;</span> Jailbreak</a>
        <a href="settings.html"><span class="nav-icon">&#9679;</span> Settings</a>
    </nav>

    <script>
        const baseURL = 'https://api-nanzz.my.id/docs/api/ai';

        const endpointConfigs = {
            'chat-gpt': {
                url: baseURL + '/chat-gpt.php',
                params: { text: '', model: 'chatgpt' },
                modelRequired: true
            },
            'gemini': {
                url: baseURL + '/gemini.php',
                params: { text: '' },
                modelRequired: false
            },
            'worm-gpt': {
                url: baseURL + '/worm-gpt.php',
                params: { prompt: '' },
                modelRequired: false
            },
            'uncensored': {
                url: baseURL + '/uncensored-ai.php',
                params: { text: '' },
                modelRequired: false
            }
        };

        let currentEndpoint = 'chat-gpt';

        function loadEndpoint(type) {
            document.getElementById('endpointSelect').value = type;
            onEndpointChange();
        }

        function onEndpointChange() {
            const endpoint = document.getElementById('endpointSelect').value;
            currentEndpoint = endpoint;
            const modelGroup = document.getElementById('modelGroup');
            const config = endpointConfigs[endpoint];
            if (config.modelRequired) {
                modelGroup.style.display = 'block';
            } else {
                modelGroup.style.display = 'none';
            }
        }

        async function sendRequest() {
    const inputText = document.getElementById('inputText').value.trim();
    if (!inputText) return;

    const config = endpointConfigs[currentEndpoint];
    let url = '/api/proxy?api=' + currentEndpoint;
    const params = { ...config.params };

    if (currentEndpoint === 'chat-gpt') {
        params.text = inputText;
        params.model = document.getElementById('modelSelect').value;
        url += '&' + new URLSearchParams(params).toString();
    } else if (currentEndpoint === 'gemini') {
        params.text = inputText;
        url += '&' + new URLSearchParams(params).toString();
    } else if (currentEndpoint === 'worm-gpt') {
        params.prompt = inputText;
        url += '&' + new URLSearchParams(params).toString();
    } else if (currentEndpoint === 'uncensored') {
        params.text = inputText;
        url += '&' + new URLSearchParams(params).toString();
    }

    showResponseArea();
    document.getElementById('responseBody').textContent = 'Loading...';
    document.getElementById('statusCode').textContent = '...';

    try {
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('statusCode').textContent = res.status + ' OK';
        document.getElementById('statusCode').className = 'status-code status-success';
        document.getElementById('responseBody').textContent = JSON.stringify(data, null, 2);
    } catch (err) {
        document.getElementById('statusCode').textContent = 'Error';
        document.getElementById('statusCode').className = 'status-code status-error';
        document.getElementById('responseBody').textContent = 'Network error: ' + err.message;
    }
}

        function showResponseArea() {
            document.getElementById('responseArea').style.display = 'block';
        }

        function clearResponse() {
            document.getElementById('responseArea').style.display = 'none';
            document.getElementById('responseBody').textContent = '';
        }

        function copyResponse() {
            const text = document.getElementById('responseBody').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.textContent = 'Tersalin!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Salin';
                    btn.classList.remove('copied');
                }, 1500);
            });
        }

        // Initial config
        onEndpointChange();
    </script>
</body>
</html>
