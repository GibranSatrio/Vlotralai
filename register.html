<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Register - Vlota AI & Vloral AI</title>
    <link rel="icon" href="https://files.catbox.moe/vygiot.png" type="image/png">
    <style>
        :root {
            --bg: #000;
            --surface: #080808;
            --border: #1c1c1c;
            --text: #f0f0f0;
            --text-secondary: #777;
            --accent: #fff;
            --hover: #121212;
            --danger: #ff3b30;
            --success: #30d158;
            --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 400px;
        }

        .register-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px 24px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .register-logo {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            overflow: hidden;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }
        .register-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .register-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }
        .register-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 14px;
        }
        .form-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .form-input {
            width: 100%;
            padding: 11px 14px;
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s;
        }
        .form-input:focus {
            border-color: #444;
        }
        .form-input::placeholder {
            color: #333;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: -0.2px;
            transition: all 0.15s;
            font-family: var(--font);
            margin-top: 6px;
        }
        .btn-register:active {
            opacity: 0.85;
            transform: scale(0.97);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 22px 0;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider-text {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 22px;
        }
        .social-btn {
            flex: 1;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.12s;
            font-family: var(--font);
        }
        .social-btn:active {
            background: var(--hover);
            color: var(--text);
        }

        .login-link {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .login-link a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:active {
            opacity: 0.7;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 14px;
            font-size: 11px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.12s;
        }
        .back-home:active {
            color: var(--text);
        }

        .error-message {
            background: rgba(255, 51, 51, 0.08);
            border: 1px solid rgba(255, 51, 51, 0.2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 11px;
            color: var(--danger);
            margin-bottom: 14px;
            display: none;
        }
        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(48, 209, 88, 0.08);
            border: 1px solid rgba(48, 209, 88, 0.2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 11px;
            color: var(--success);
            margin-bottom: 14px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="register-logo">
                    <img src="https://files.catbox.moe/vygiot.png" alt="Vlota AI">
                </div>
                <div class="register-title">Buat Akun</div>
                <div class="register-subtitle">Daftar ke Vlota AI & Vloral AI</div>
            </div>

            <div class="error-message" id="errorMessage">Password tidak cocok. Silakan coba lagi.</div>
            <div class="success-message" id="successMessage">Akun berhasil dibuat! Mengarahkan ke dashboard...</div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="name">Nama Lengkap</label>
                    <input type="text" id="name" class="form-input" placeholder="Nama Anda" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="anda@email.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Konfirmasi Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Ulangi password" required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="btn-register">Daftar</button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">atau daftar dengan</div>
                <div class="divider-line"></div>
            </div>

            <div class="social-btns">
                <button class="social-btn" onclick="socialRegister('google')">Google</button>
                <button class="social-btn" onclick="socialRegister('github')">GitHub</button>
                <button class="social-btn" onclick="socialRegister('discord')">Discord</button>
            </div>

            <div class="login-link">
                Sudah punya akun? <a href="login.html">Masuk</a>
            </div>
        </div>

        <a href="dashboard.html" class="back-home">Kembali ke Dashboard</a>
    </div>

    <script>
        function handleRegister(event) {
            event.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            // Hide messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            // Validate passwords match
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Password tidak cocok. Silakan coba lagi.';
                errorMsg.classList.add('show');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                errorMsg.textContent = 'Password minimal 6 karakter.';
                errorMsg.classList.add('show');
                return;
            }

            // Demo: save user data
            const userData = {
                name: name,
                email: email,
                registeredAt: new Date().toISOString()
            };

            localStorage.setItem('vlota_user', JSON.stringify(userData));

            // Create session
            const sessionData = {
                email: email,
                name: name,
                loggedIn: true,
                timestamp: new Date().toISOString()
            };
            sessionStorage.setItem('vlota_session', JSON.stringify(sessionData));

            // Show success
            successMsg.classList.add('show');

            // Redirect after delay
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        }

        function socialRegister(provider) {
            alert('Pendaftaran dengan ' + provider + ' - Mode demo. Gunakan form di atas untuk mendaftar.');
        }

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const session = JSON.parse(
                sessionStorage.getItem('vlota_session') ||
                localStorage.getItem('vlota_session') ||
                'null'
            );

            if (session && session.loggedIn) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
